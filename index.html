<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Hi 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #ffe0ec;
      --accent: #ff6fa8;
      --box-bg: rgba(255, 240, 246, 0.92);
      --shadow: rgba(255, 80, 140, 0.35);
      --slot-size: 190px;
    }
 
    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 20% 30%, #ffd6e8 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, #ffb3cf 0%, transparent 50%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      cursor: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><text y="30" font-size="32">🖕</text></svg>') 20 5, auto;
    }
 
    /* ── Floating emojis ── */
    .emoji-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .emoji-float {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0;
      animation: floatUp var(--dur) ease-in var(--delay) infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0.6) rotate(0deg); opacity: 0; }
      8%   { opacity: 0.75; }
      88%  { opacity: 0.45; }
      100% { transform: translateY(-108vh) scale(1.1) rotate(15deg); opacity: 0; }
    }
 
    /* ── Heart wrapper ── */
    .heart-wrap {
      position: relative;
      z-index: 1;
      width: 650px;
      height: 600px;
      cursor: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><text y="30" font-size="32">🖕</text></svg>') 20 5, pointer;
      transform-origin: center 55%;
      flex-shrink: 0;
      opacity: 1;
    }
 
    /* ── SVG heart background ── */
    .heart-wrap svg.heart-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 18px 40px rgba(255, 80, 140, 0.38));
    }

    /* ── Heart crack overlay ── */
    .heart-crack-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .heart-crack-overlay.visible {
      opacity: 1;
    }
    .heart-crack-overlay.hidden {
      opacity: 0 !important;
    }
 
    /* ── Slots container — sits on top of SVG ── */
    .slots-layer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding-bottom: 3rem;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .slots-layer.hidden {
      opacity: 0;
    }
 
    /* ── Slot window — circular ── */
    .slot-window {
      width: var(--slot-size);
      height: var(--slot-size);
      background: var(--box-bg);
      border: 3px solid rgba(255, 150, 190, 0.6);
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      box-shadow: 0 4px 18px var(--shadow), 0 1px 0 #fff inset;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      flex-shrink: 0;
      pointer-events: auto;
      cursor: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><text y="30" font-size="32">🖕</text></svg>') 20 5, pointer;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }
    .slot-window:hover {
      transform: scale(1.09);
      box-shadow: 0 10px 32px rgba(255, 80, 140, 0.45), 0 1px 0 #fff inset;
    }
    .slot-window.popped {
      transform: scale(1.16);
      box-shadow: 0 16px 44px rgba(255, 80, 140, 0.6), 0 1px 0 #fff inset;
    }
    .slot-window::before,
    .slot-window::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: calc(var(--slot-size) * 0.27);
      z-index: 2;
      pointer-events: none;
    }
    .slot-window::before { top: 0;    background: linear-gradient(to bottom, rgba(255,240,246,0.98), transparent); }
    .slot-window::after  { bottom: 0; background: linear-gradient(to top,   rgba(255,240,246,0.98), transparent); }
 
    /* ── Slot track ── */
    .slot-track {
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }
    .slot-item {
      height: var(--slot-size);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Dancing Script', cursive;
      font-size: 2.4rem;
      color: var(--accent);
      white-space: nowrap;
      padding: 0 0.6rem;
      text-align: center;
      flex-shrink: 0;
    }
 
    /* ── Heartbeat — two pumps ── */
    @keyframes heartpump {
      0%   { transform: scale(1); }
      14%  { transform: scale(1.09); }
      28%  { transform: scale(1); }
      42%  { transform: scale(1.055); }
      62%  { transform: scale(1); }
      100% { transform: scale(1); }
    }
    .heart-wrap.beating {
      animation: heartpump 0.75s ease-in-out infinite;
    }

    /* ── Heart shake animation ── */
    @keyframes heartShake {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      20% { transform: translateX(-10px) rotate(-5deg); }
      40% { transform: translateX(10px) rotate(5deg); }
      60% { transform: translateX(-8px) rotate(-3deg); }
      80% { transform: translateX(8px) rotate(3deg); }
    }
    .heart-wrap.shaking {
      animation: heartShake 0.6s ease-in-out;
    }

    /* ── Crack lines ── */
    .crack-line {
      stroke: #ff2d6a;
      stroke-width: 4;
      fill: none;
      stroke-linecap: round;
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      filter: drop-shadow(0 0 3px rgba(255, 45, 106, 0.8));
    }
    .crack-line.animate {
      animation: drawCrack 0.6s ease forwards;
    }
    @keyframes drawCrack {
      to { stroke-dashoffset: 0; }
    }

    /* ── Broken pieces overlay ── */
    .broken-pieces-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .broken-pieces-overlay.visible {
      opacity: 1;
    }

    .broken-piece {
      fill: url(#hg);
      stroke: rgba(255,100,160,0.55);
      stroke-width: 2;
      opacity: 0;
      transform-origin: center;
    }
    .broken-piece.animate {
      animation: pieceFall var(--fall-duration) ease-out forwards;
    }
    @keyframes pieceFall {
      0% { 
        opacity: 1; 
        transform: translate(0, 0) rotate(0deg);
      }
      100% { 
        opacity: 0; 
        transform: translate(var(--fall-x), var(--fall-y)) rotate(var(--fall-rotate));
      }
    }

    /* ── 404 Error Message ── */
    .error-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    .error-message.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .error-text {
      font-family: 'Dancing Script', cursive;
      font-size: 3rem;
      color: var(--accent);
      text-shadow: 0 4px 20px rgba(255, 105, 180, 0.4);
      line-height: 1.6;
      white-space: nowrap;
    }

    /* ── Mobile Responsive ── */
    @media (max-width: 700px) {
      :root {
        --slot-size: 130px;
      }
      
      .heart-wrap { 
        width: 380px; 
        height: 350px; 
      }
      
      .slots-layer { 
        gap: 1.5rem; 
        padding-bottom: 1.8rem; 
      }
      
      .slot-item { 
        font-size: 1.6rem; 
      }
      
      .error-text { 
        font-size: 1.8rem; 
        white-space: normal; 
        padding: 0 20px; 
        line-height: 1.5;
      }
    }

    @media (max-width: 400px) {
      :root {
        --slot-size: 110px;
      }
      
      .heart-wrap { 
        width: 320px; 
        height: 300px; 
      }
      
      .slots-layer { 
        gap: 1rem; 
        padding-bottom: 1.5rem; 
      }
      
      .slot-item { 
        font-size: 1.3rem; 
      }
      
      .error-text { 
        font-size: 1.5rem; 
      }
    }
  </style>
</head>
<body>

  <svg class="broken-pieces-overlay" id="brokenPiecesOverlay" viewBox="0 0 650 600" xmlns="http://www.w3.org/2000/svg">

<script>
  /* ── Audio Context for Sounds ── */
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  let heartbeatInterval = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new AudioContext();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playHeartbeat() {
    if (!audioCtx) return;
    
    // First beat
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    
    osc1.frequency.setValueAtTime(60, audioCtx.currentTime);
    osc1.type = 'sine';
    
    gain1.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    
    osc1.start(audioCtx.currentTime);
    osc1.stop(audioCtx.currentTime + 0.15);
    
    // Second beat (echo)
    setTimeout(() => {
      if (!audioCtx) return;
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      
      osc2.frequency.setValueAtTime(50, audioCtx.currentTime);
      osc2.type = 'sine';
      
      gain2.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      
      osc2.start(audioCtx.currentTime);
      osc2.stop(audioCtx.currentTime + 0.1);
    }, 150);
  }

  function startHeartbeatSound() {
    if (heartbeatInterval) return;
    initAudio();
    playHeartbeat();
    heartbeatInterval = setInterval(playHeartbeat, 750);
  }

  function stopHeartbeatSound() {
    if (heartbeatInterval) {
      clearInterval(heartbeatInterval);
      heartbeatInterval = null;
    }
  }

  function playCrackSound() {
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * 0.4;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.08));
    }
    
    const source = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    
    source.buffer = buffer;
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(3000, audioCtx.currentTime);
    
    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    
    source.start();
  }

  function playShatterSound() {
    if (!audioCtx) return;
    
    // Multiple crack sounds for shatter effect
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        const bufferSize = audioCtx.sampleRate * 0.3;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        
        for (let j = 0; j < bufferSize; j++) {
          data[j] = (Math.random() * 2 - 1) * Math.exp(-j / (bufferSize * 0.05));
        }
        
        const source = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        
        source.buffer = buffer;
        filter.type = 'highpass';
        filter.frequency.setValueAtTime(1000 + Math.random() * 2000, audioCtx.currentTime);
        
        source.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        
        source.start();
      }, i * 50);
    }
  }

  /* ── 1. ENDLESS FLOATING EMOJIS ── */
  const floatSymbols = ['🥰','😋','🥺','💖','😊','💕','💗','💓'];
  const emojiBg = document.getElementById('emojiBg');
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('span');
    el.className = 'emoji-float';
    el.textContent = floatSymbols[i % floatSymbols.length];
    const dur   = (7 + Math.random() * 8).toFixed(2);
    const delay = -(Math.random() * 15).toFixed(2);
    el.style.setProperty('--dur',   dur + 's');
    el.style.setProperty('--delay', delay + 's');
    el.style.left   = (Math.random() * 98) + 'vw';
    el.style.bottom = '0px';
    emojiBg.appendChild(el);
  }

  /* ── 2. SLOT MACHINE ── */
  function getSlotSize() {
    const style = getComputedStyle(document.documentElement);
    return parseInt(style.getPropertyValue('--slot-size')) || 190;
  }

  function buildAndSpin(trackEl, names) {
    const ITEM_H = getSlotSize();
    
    const winnerIndex = Math.floor(Math.random() * names.length);
    const FAST_ITEMS = 40;
    const SLOW_EXTRA = names.length;
    const items = [];
    for (let i = 0; i < FAST_ITEMS; i++) items.push(names[Math.floor(Math.random() * names.length)]);
    for (let i = 0; i < SLOW_EXTRA; i++) items.push(names[i % names.length]);
    items.push(names[winnerIndex]);

    trackEl.innerHTML = '';
    items.forEach(name => {
      const div = document.createElement('div');
      div.className = 'slot-item';
      div.textContent = name;
      trackEl.appendChild(div);
    });

    const fastY  = -(FAST_ITEMS * ITEM_H);
    const finalY = -((items.length - 1) * ITEM_H);

    // Reset position
    trackEl.style.transition = 'none';
    trackEl.style.transform  = 'translateY(0px)';

    // Force reflow
    void trackEl.offsetHeight;

    // Start animation after a small delay to ensure DOM is ready
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        trackEl.style.transition = 'transform 1.8s cubic-bezier(0.4, 0.0, 0.8, 1.0)';
        trackEl.style.transform  = `translateY(${fastY}px)`;
        
        const onFastEnd = () => {
          trackEl.removeEventListener('transitionend', onFastEnd);
          trackEl.style.transition = 'transform 3.5s cubic-bezier(0.15, 0.85, 0.2, 1.0)';
          trackEl.style.transform  = `translateY(${finalY}px)`;
        };
        
        trackEl.addEventListener('transitionend', onFastEnd);
      });
    });
  }

  /* ── 3. DATA ── */
  const greetings = ['Hi', 'Yo', 'Hiee', 'Heyy'];
  const names     = ['babe','queen','honey','kannamma','baby','bbg','my love','my lady','da ma','kid','miss'];

  // Initialize slots after DOM is fully loaded
  function initSlots() {
    buildAndSpin(document.getElementById('greetTrack'), greetings);
    buildAndSpin(document.getElementById('nameTrack'), names);
  }

  // Run on load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initSlots);
  } else {
    initSlots();
  }

  /* ── 4. SLOT CLICK — re-spin + pop ── */
  function addSlotPop(win, track, list) {
    win.addEventListener('click', (e) => {
      e.stopPropagation();
      initAudio();
      win.classList.add('popped');
      setTimeout(() => win.classList.remove('popped'), 400);
      buildAndSpin(track, list);
    });
  }
  addSlotPop(document.getElementById('greetSlotWin'), document.getElementById('greetTrack'), greetings);
  addSlotPop(document.getElementById('nameSlotWin'),  document.getElementById('nameTrack'),  names);

  /* ── 5. HEARTBEAT on hover / hold ── */
  const wrap = document.getElementById('heartWrap');
  let beating = false;

  function startBeat() {
    if (beating) return;
    beating = true;
    wrap.classList.add('beating');
    startHeartbeatSound();
  }

  function stopBeat() {
    if (!beating) return;
    beating = false;
    wrap.classList.remove('beating');
    stopHeartbeatSound();
  }

  wrap.addEventListener('mouseenter', startBeat);
  wrap.addEventListener('mouseleave', stopBeat);
  wrap.addEventListener('mousedown',  startBeat);
  document.addEventListener('mouseup', stopBeat);
  wrap.addEventListener('touchstart', (e) => {
    if (!e.target.closest('.slot-window')) {
      startBeat();
    }
  }, { passive: true });
  wrap.addEventListener('touchend', stopBeat);

  /* ── 6. HEART BREAKING MECHANIC ── */
  let clickCount = 0;
  const maxClicks = 3;
  const crackOverlay = document.getElementById('crackOverlay');
  const brokenPiecesOverlay = document.getElementById('brokenPiecesOverlay');
  const errorMessage = document.getElementById('errorMessage');
  const slotsLayer = document.getElementById('slotsLayer');

  // Crack groups for progressive breaking
  const crackGroups = [
    ['crack1', 'crack2', 'crack6'],           // First click: outer cracks
    ['crack3', 'crack4', 'crack5', 'crack9', 'crack10'],  // Second click: more cracks spreading
    ['crack7', 'crack8']                       // Third click: final cracks before shatter
  ];

  const crackLines = [
    document.getElementById('crack1'),
    document.getElementById('crack2'),
    document.getElementById('crack3'),
    document.getElementById('crack4'),
    document.getElementById('crack5'),
    document.getElementById('crack6'),
    document.getElementById('crack7'),
    document.getElementById('crack8'),
    document.getElementById('crack9'),
    document.getElementById('crack10')
  ];

  const brokenPieces = document.querySelectorAll('.broken-piece');

  wrap.addEventListener('click', (e) => {
    // Don't count clicks on slots
    if (e.target.closest('.slot-window')) return;
    
    initAudio();
    
    if (clickCount >= maxClicks) return;
    
    clickCount++;
    
    // Play crack sound
    playCrackSound();
    
    // Shake animation
    wrap.classList.add('shaking');
    setTimeout(() => wrap.classList.remove('shaking'), 600);
    
    // Show cracks progressively
    crackOverlay.classList.add('visible');
    const currentCrackGroup = crackGroups[clickCount - 1];
    currentCrackGroup.forEach(crackId => {
      const crackEl = document.getElementById(crackId);
      if (crackEl) {
        crackEl.classList.add('animate');
      }
    });
    
    // Break the heart completely after 3 clicks
    if (clickCount >= maxClicks) {
      setTimeout(() => {
        // Play shatter sound
        playShatterSound();
        
        // Hide the crack lines
        crackOverlay.classList.add('hidden');
        
        // Hide the slot circles
        slotsLayer.classList.add('hidden');
        
        // Show broken pieces falling
        brokenPiecesOverlay.classList.add('visible');
        brokenPieces.forEach((piece, index) => {
          setTimeout(() => {
            piece.classList.add('animate');
          }, index * 30);
        });
        
        // Hide the main heart path
        document.getElementById('heartPath').style.opacity = '0';
        
        // Show error message after pieces fall
        setTimeout(() => {
          errorMessage.classList.add('visible');
        }, 1500);
      }, 400);
    }
  });
</script>
</body>
